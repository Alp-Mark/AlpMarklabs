name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-checks:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r worker/requirements.txt -r requirements-dev.txt

      - name: Run ruff
        run: |
          ruff check backend worker

      - name: Run mypy
        run: |
          mypy backend worker

      - name: Run pytest
        run: |
          pytest

  docker-builds:
    name: Docker builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t alpmark-backend:ci .

      - name: Build worker image
        run: docker build -f worker/Dockerfile -t alpmark-worker:ci .
